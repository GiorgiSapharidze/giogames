<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Typer</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0; padding: 0; overflow: hidden;
    background: #e4d3ae;
    font-family: 'Lora', Georgia, serif;
    height: 100%;
  }
  #game { position: relative; width: 100vw; height: 100vh; }
  canvas { display: block; }

  #hud {
    position: absolute; top: 16px; left: 20px; color: #3a2c1a;
    font-size: 17px; font-weight: bold; z-index: 10;
  }
  #hud div { margin-bottom: 3px; }

  #typedDisplay {
    position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
    color: #3a2c1a; font-size: 22px; letter-spacing: 1px; font-weight: bold;
    z-index: 10; min-height: 60px;
  }

  #overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: #3a2c1a; text-align: center; z-index: 20;
    background: rgba(228,211,174,0.97);
  }
  #overlay h1 {
    font-size: 40px; margin-bottom: 6px; font-weight: bold;
    letter-spacing: 1px;
  }
  #overlay p { color: #5c4a34; max-width: 420px; line-height: 1.5; font-size: 15px; }
  #overlay button {
    margin-top: 20px; padding: 10px 28px; font-size: 16px; cursor: pointer;
    background: #a0522d; border: none; color: #fff8ee; font-weight: bold;
    border-radius: 3px; font-family: inherit;
    box-shadow: 0 2px 0 #6e3618;
  }
  #overlay button:hover { background: #8a4526; }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div id="game">
  <canvas id="canvas"></canvas>
  <div id="hud">
    <div>Score: <span id="score">0</span></div>
    <div>Lives: <span id="lives">3</span></div>
    <div>Wave: <span id="wave">0</span></div>
  </div>
  <div id="typedDisplay"></div>

  <div id="overlay">
    <h1>Typer</h1>
    <p>Type the falling words before they land. You get only 3 lives.</p>
    <button id="startBtn">Start</button>
  </div>
</div>

<footer>made with love by giorgi</footer>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let running = false;
let fireflies = [];
function resize(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; if (typeof initFireflies === 'function' && fireflies.length) initFireflies(); }
resize();
window.addEventListener('resize', resize);
g
let WORDLIST = ["apple","cabin","quilt","maple","ember"]; // json tu ar chietvirta ucbad es fallback

fetch('words.json')
  .then(res => res.json())
  .then(data => {
    if (Array.isArray(data.words) && data.words.length > 0) {
      WORDLIST = data.words;
    }
  })
  .catch(() => {
    console.warn('Could not load words.json, using fallback word list.');
  });

// sound engine fully code no external files by yours truly
let actx = null;
function ensureAudio() {
  if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  if (actx.state === 'suspended') actx.resume();
}
function playTone({freq = 440, duration = 0.1, type = 'sine', gain = 0.15, glideTo = null}) {
  if (!actx) return;
  const osc = actx.createOscillator();
  const g = actx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, actx.currentTime);
  if (glideTo) osc.frequency.exponentialRampToValueAtTime(glideTo, actx.currentTime + duration);
  g.gain.setValueAtTime(gain, actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + duration);
  osc.connect(g);
  g.connect(actx.destination);
  osc.start();
  osc.stop(actx.currentTime + duration);
}
function soundKeystroke() {
  playTone({ freq: 520 + Math.random() * 80, duration: 0.05, type: 'triangle', gain: 0.08 });
}
function soundDestroy() {
  playTone({ freq: 660, duration: 0.18, type: 'sine', gain: 0.15, glideTo: 990 });
  setTimeout(() => playTone({ freq: 880, duration: 0.12, type: 'sine', gain: 0.1 }), 40);
}
function soundMiss() {
  playTone({ freq: 180, duration: 0.3, type: 'sawtooth', gain: 0.12, glideTo: 90 });
}
function soundWrong() {
  playTone({ freq: 140, duration: 0.06, type: 'square', gain: 0.06 });
}

// background pad fully with oscillators by yours truly again
let ambientNodes = null;
let chordInterval = null;

function startAmbient() {
  if (!actx || ambientNodes) return;
  const master = actx.createGain();
  master.gain.setValueAtTime(0.0001, actx.currentTime);
  master.connect(actx.destination);
  master.gain.linearRampToValueAtTime(0.05, actx.currentTime + 2);

  const filter = actx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 2500;
  filter.connect(master);

  const filter2 = actx.createBiquadFilter();
  filter2.type = 'highpass';
  filter2.frequency.value = 400;
  filter2.connect(master);

  // C Am F G
  const chords = [
    [220.00, 261.63, 329.63], 
    [174.61, 220.00, 261.63], 
    [196.00, 246.94, 293.66],
    [261.63, 329.63, 392.00],
  ];

  const oscs = chords[0].map(f => {
    const o = actx.createOscillator();
    o.type = 'triangle';
    o.frequency.value = f;
    const g = actx.createGain();
    g.gain.value = .2;
    o.connect(g);
    g.connect(filter);
    o.start();
    return o;
  });

  //lfo cut off i know my shit fl studio ranked diamond
  const lfo = actx.createOscillator();
  lfo.frequency.value = 0.07;
  const lfoGain = actx.createGain();
  lfoGain.gain.value = 400;
  lfo.connect(lfoGain);
  lfoGain.connect(filter.frequency);
  lfo.start();

  ambientNodes = { master, oscs, lfo };

  // change chord every 6/10s and a lil luh glide for 2s
  let chordIndex = 0;
  chordInterval = setInterval(() => {
    chordIndex = (chordIndex + 1) % chords.length;
    const next = chords[chordIndex];
    oscs.forEach((o, i) => {
      o.frequency.cancelScheduledValues(actx.currentTime);
      o.frequency.setValueAtTime(o.frequency.value, actx.currentTime);
      o.frequency.linearRampToValueAtTime(next[i], actx.currentTime + 2);
    });
  }, 6000 + Math.random() * 800); // every 6-10s
}


function stopAmbient() {
  if (!actx || !ambientNodes) return;
  const { master, oscs, lfo } = ambientNodes;
  master.gain.cancelScheduledValues(actx.currentTime);
  master.gain.setValueAtTime(master.gain.value, actx.currentTime);
  master.gain.linearRampToValueAtTime(0, actx.currentTime + 1);
  setTimeout(() => {
    oscs.forEach(o => { try { o.stop(); } catch(e){} });
    try { lfo.stop(); } catch(e){}
  }, 1100);
  ambientNodes = null;
}

let score = 0, lives = 3;
let words = [];
let typed = "";
let lockedWord = null;
let particles = [];
let pops = [];
let lastTime = 0;

// waves
let waveNumber = 0;
let waveWordsRemaining = 0;
let waveSpawnTimer = 0;
let waveSpawnGap = 350; 
let waveBreakTimer = 0;
let waveBreakDuration = 2200; 
let inWaveBreak = true;

const scoreEl = document.getElementById('score');
const livesEl = document.getElementById('lives');
const waveEl = document.getElementById('wave');
const typedDisplay = document.getElementById('typedDisplay');
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');

const PALETTE = ["#a0522d", "#4a5d23", "#8b3a2f", "#2f5266", "#6e4a1f", "#5c3a5c"];

function randWord() {
  return WORDLIST[Math.floor(Math.random() * WORDLIST.length)];
}

function spawnWord() {
  const text = randWord();
  const fontSize = 22;
  ctx.font = fontSize + "px Georgia";
  const w = ctx.measureText(text).width;
  const x = Math.random() * (canvas.width - w - 40) + 20;
  words.push({
    text, x, y: -20, w, fontSize,
    speed: 21 + Math.random() * 15 + waveNumber * 2.2,
    color: PALETTE[Math.floor(Math.random() * PALETTE.length)]
  });
}

function addPuff(x, y, color) {
  for (let i = 0; i < 10; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 150,
      vy: (Math.random() - 0.5) * 150 - 30,
      life: 500 + Math.random() * 170,
      maxLife: 670,
      color
    });
  }
}

function initFireflies() {
  fireflies = [];
  const count = Math.floor((canvas.width * canvas.height) / 32000);
  for (let i = 0; i < count; i++) {
    fireflies.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height - 200,
      baseY: Math.random() * (canvas.height - 50),
      r: 2 + Math.random() * 2.2,
      phase: Math.random() * Math.PI * 2,
      speed: 0.15 + Math.random() * 0.2,
      drift: (Math.random() - 0.5) * 12
    });
  }
}

function resetGame() {
  score = 0; lives = 3;
  words = []; particles = []; pops = []; typed = ""; lockedWord = null;
  initFireflies();
  waveNumber = 0;
  waveWordsRemaining = 0;
  waveSpawnTimer = 0;
  waveBreakTimer = 0;
  inWaveBreak = true;
  waveEl.textContent = "0";
  updateHUD();
  typedDisplay.textContent = "";
}

function updateHUD() {
  scoreEl.textContent = score;
  livesEl.textContent = lives;
}

function gameOver() {
  running = false;
  stopAmbient();
  overlay.querySelector('h1').textContent = "Game over";
  overlay.querySelector('p').textContent = "Score: " + score;
  startBtn.textContent = "Play again";
  overlay.classList.remove('hidden');
}

function nestPos() {
  const bob = Math.sin(performance.now() / 900) * 3;
  return { x: canvas.width / 2, y: canvas.height - 36 + bob };
}

function drawNest() {
  const {x, y} = nestPos();
  ctx.save();
  ctx.translate(x, y);

  // made with ai
  ctx.strokeStyle = '#3a2c1a';
  ctx.fillStyle = '#a0522d';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-24, -6);
  ctx.lineTo(24, -6);
  ctx.lineTo(18, 16);
  ctx.quadraticCurveTo(0, 22, -18, 16);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // made with ai
  ctx.strokeStyle = 'rgba(58,44,26,0.5)';
  ctx.lineWidth = 1.2;
  for (let i = -18; i <= 18; i += 6) {
    ctx.beginPath();
    ctx.moveTo(i, -5);
    ctx.lineTo(i * 0.78, 16);
    ctx.stroke();
  }
  ctx.beginPath();
  ctx.moveTo(-23, 2);
  ctx.lineTo(21, 2);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(-21, 9);
  ctx.lineTo(19, 9);
  ctx.stroke();

  // made with ai
  ctx.strokeStyle = '#3a2c1a';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.arc(0, -6, 16, Math.PI, 0);
  ctx.stroke();

  ctx.restore();
}

function dangerY() {
  return canvas.height - 30;
}

function startWave() {
  waveNumber++;
  waveWordsRemaining = 4 + Math.min(10, Math.floor(waveNumber * 1.3));
  waveSpawnGap = Math.max(180, 360 - waveNumber * 8);
  waveSpawnTimer = 0;
  inWaveBreak = false;
  waveEl.textContent = waveNumber;
}

function update(dt) {
  if (inWaveBreak) {
    waveBreakTimer += dt * 1000;
    if (waveBreakTimer >= waveBreakDuration) {
      waveBreakTimer = 0;
      startWave();
    }
  } else {
    waveSpawnTimer += dt * 1000;
    if (waveSpawnTimer >= waveSpawnGap && waveWordsRemaining > 0) {
      waveSpawnTimer = 0;
      spawnWord();
      waveWordsRemaining--;
    }
    if (waveWordsRemaining <= 0 && words.length === 0) {
      inWaveBreak = true;
      waveBreakTimer = 0;
    }
  }

  for (let i = words.length - 1; i >= 0; i--) {
    const w = words[i];
    w.y += w.speed * dt;
    if (w.y > dangerY()) {
      words.splice(i, 1);
      if (lockedWord === w) { lockedWord = null; typed = ""; typedDisplay.textContent = ""; }
      lives--;
      soundMiss();
      updateHUD();
      if (lives <= 0) { gameOver(); return; }
    }
  }

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt * 1000;
    if (p.life <= 0) particles.splice(i, 1);
  }

  fireflies.forEach(f => {
    f.phase += dt * f.speed;
    f.x += Math.sin(f.phase) * dt * 6;
    f.y = f.baseY + Math.sin(f.phase * 0.7) * f.drift;
  });

  for (let i = pops.length - 1; i >= 0; i--) {
    const p = pops[i];
    p.life -= dt * 100;
    if (p.life <= 0) pops.splice(i, 1);
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#e4d3ae';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = 'rgba(100,100,20,0.2)';
  for (let i = 0; i < 200; i++) { 
    const sx = (i * 173.2) % canvas.width;
    const sy = (i * 91.7) % canvas.height;
    ctx.beginPath();
    ctx.arc(sx, sy, 1.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // fireflies
  //fireflies.forEach(f => {
  //  const glow = 0.55 + 0.35 * Math.sin(f.phase * 1.3);
    // const haloR = f.r * 5;
    // const halo = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, haloR);
    // halo.addColorStop(0, `rgba(220,220,100,${0.3 * glow})`); 
    // halo.addColorStop(1, 'rgba(200,200,100,0)');
    // ctx.fillStyle = halo;
    // ctx.beginPath();
    // ctx.arc(f.x, f.y, haloR, 0, Math.PI * 2);
    // ctx.fill();

  //   ctx.beginPath();
  //   ctx.fillStyle = `rgba(255,224,150,${0.55 * glow})`;
  //   ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
  //   ctx.fill();
  // });

  // dotted danger line
  ctx.save();
  ctx.strokeStyle = 'rgba(139,58,47,0.55)';
  ctx.lineWidth = 2;
  ctx.setLineDash([8, 6]);
  ctx.beginPath();
  ctx.moveTo(0, dangerY());
  ctx.lineTo(canvas.width, dangerY());
  ctx.stroke();
  ctx.restore();

  drawNest();

  if (lockedWord) {
    const nest = nestPos();
    ctx.save();
    ctx.strokeStyle = 'rgba(58,44,26,0.45)';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(nest.x, nest.y - 10);
    ctx.lineTo(lockedWord.x + lockedWord.w / 2, lockedWord.y);
    ctx.stroke();
    ctx.restore();
  }

  if (inWaveBreak && waveNumber > 0) {
    ctx.save();
    ctx.fillStyle = 'rgba(58,44,26,0.55)';
    ctx.font = "bold 20px Georgia";
    ctx.textAlign = 'center';
    ctx.fillText("wave " + (waveNumber + 1) + " incoming...", canvas.width / 2, canvas.height / 2 - 60);
    ctx.restore();
  }

  words.forEach(w => {
    ctx.font = "bold " + w.fontSize + "px Georgia";
    const isLocked = w === lockedWord;
    const matchedLen = isLocked ? typed.length : 0;

    let cursorX = w.x;
    for (let i = 0; i < w.text.length; i++) {
      const ch = w.text[i];
      const chWidth = ctx.measureText(ch).width;
      if (isLocked && i < matchedLen) {
        ctx.fillStyle = '#3a2c1a';
        ctx.fillRect(cursorX - 1, w.y - w.fontSize + 2, chWidth + 2, w.fontSize + 6);
        ctx.fillStyle = '#f5eeda';
      } else {
        ctx.fillStyle = w.color;
      }
      ctx.fillText(ch, cursorX, w.y);
      cursorX += chWidth;
    }
  });

  particles.forEach(p => {
    ctx.fillStyle = p.color;
    ctx.globalAlpha = Math.max(0, p.life / p.maxLife);
    ctx.beginPath();
    ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  });

  pops.forEach(p => {
    const t = 1 - p.life / p.maxLife;
    ctx.save();
    ctx.globalAlpha = Math.max(0, 1 - t);
    ctx.fillStyle = '#4a5d23';
    ctx.font = "bold " + (14 + t * 10) + "px Georgia";
    ctx.textAlign = 'center';
    ctx.fillText("+" + p.value, p.x, p.y - t * 26);
    ctx.restore();
  });
}

function loop(timestamp) {
  if (!running) return;
  if (!lastTime) lastTime = timestamp;
  let dt = (timestamp - lastTime) / 1000; // seconds
  lastTime = timestamp;
  dt = Math.min(dt, 0.05); 

  update(dt);
  draw();
  requestAnimationFrame(loop);
}

window.addEventListener('keydown', (e) => {
  if (!running) return;
  const key = e.key;
  if (key.length !== 1 || !/[a-zA-Z]/.test(key)) return;
  const char = key.toLowerCase();

  if (!lockedWord) {
    const candidates = words.filter(w => w.text[0] === char);
    if (candidates.length === 0) return;
    candidates.sort((a, b) => b.y - a.y);
    lockedWord = candidates[0];
    typed = "";
  }

  if (lockedWord && lockedWord.text[typed.length] === char) {
    typed += char;
    typedDisplay.textContent = typed;
    if (typed.length === lockedWord.text.length) {
      const gained = lockedWord.text.length * 10;
      score += gained;
      addPuff(lockedWord.x + lockedWord.w / 2, lockedWord.y, lockedWord.color);
      pops.push({ x: lockedWord.x + lockedWord.w / 2, y: lockedWord.y, life: 700, maxLife: 700, value: gained });
      words.splice(words.indexOf(lockedWord), 1);
      lockedWord = null;
      typed = "";
      typedDisplay.textContent = "";
      updateHUD();
      soundDestroy();
    } else {
      soundKeystroke();
    }
  } else {
    soundWrong();
  }
});

startBtn.addEventListener('click', () => {
  ensureAudio();
  startAmbient();
  overlay.classList.add('hidden');
  overlay.querySelector('h1').textContent = "Typer";
  overlay.querySelector('p').textContent = "Type the falling words before they land.";
  resetGame();
  running = true;
  lastTime = 0;
  requestAnimationFrame(loop);
});
</script>
</body>
</html>
